<!DOCTYPE html>
<html>

    <title>MaxMod</title>

    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <div class="header">
      <h1>MaxMod</h1>

    </div>

    <!-- Electron renderer -->
    <script src="./renderer.js"></script>

  </body>
</html>
